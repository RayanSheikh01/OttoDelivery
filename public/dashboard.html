<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Otto Dispatch</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0e13;
    --panel: #11161e;
    --panel-2: #161c26;
    --line: #1f2733;
    --line-soft: #172029;
    --ink: #e8edf4;
    --muted: #7f8a9b;
    --faint: #5a6474;
    --amber: #ffb000;
    --amber-dim: #b87c08;
    --idle: #35d6a4;
    --busy: #ffb000;
    --offline: #59647a;
    --s-created: #8592a4;
    --s-routed: #45b8f0;
    --s-assigned: #8b8cf6;
    --s-ofd: #ffb000;
    --s-delivered: #35d6a4;
    --s-exception: #ff5d6c;
    --s-cancelled: #4a5568;
    --mono: "IBM Plex Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
    --disp: "Space Grotesk", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--disp);
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── top bar ── */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0e131b, #0b0e13);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-weight: 700; font-size: 19px; letter-spacing: 2px;
    color: var(--amber); text-transform: uppercase;
  }
  .brand .sub {
    font-family: var(--mono); font-size: 11px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
  }
  .live {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--idle); box-shadow: 0 0 0 0 rgba(53,214,164,.6);
  }
  .dot.pulse { animation: pulse 1.8s infinite; }
  .dot.paused { background: var(--muted); animation: none; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(53,214,164,.55); }
    70% { box-shadow: 0 0 0 7px rgba(53,214,164,0); }
    100% { box-shadow: 0 0 0 0 rgba(53,214,164,0); }
  }

  .stats { display: flex; gap: 26px; margin-left: auto; }
  .stat { text-align: right; }
  .stat .n { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1; }
  .stat .l { font-size: 10px; letter-spacing: 1.4px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  .stat.amber .n { color: var(--amber); }
  .stat.green .n { color: var(--idle); }

  /* ── fleet scaler ── */
  .scaler {
    display: flex; align-items: center; gap: 10px; margin-left: 26px;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--panel-2);
  }
  .scaler label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px;
    color: var(--muted); text-transform: uppercase;
  }
  .scaler input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 118px; height: 4px;
    border-radius: 2px; background: var(--line); outline: none; cursor: pointer;
  }
  .scaler input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--amber); border: 2px solid var(--bg);
    cursor: pointer;
  }
  .scaler input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; background: var(--amber);
    border: 2px solid var(--bg); cursor: pointer;
  }
  .scaler input[type="range"]:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }
  .scaler .scaler-val {
    font-family: var(--mono); font-size: 15px; font-weight: 600;
    color: var(--amber); min-width: 16px; text-align: center;
  }

  .controls { display: flex; gap: 8px; margin-left: 26px; }
  button {
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    background: var(--panel-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 8px 12px; transition: border-color .15s, background .15s, color .15s;
  }
  button:hover { border-color: var(--amber-dim); color: #fff; }
  button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  button.primary { border-color: var(--amber-dim); color: var(--amber); }
  button.primary:hover { background: rgba(255,176,0,.08); }

  /* ── body layout ── */
  main {
    display: grid;
    grid-template-rows: 1fr auto;
    min-height: 0;
  }
  .stage {
    display: grid;
    grid-template-columns: 288px 1fr 340px;
    min-height: 0;
  }

  /* ── agent pipeline bar ── */
  .agentbar { border-top: 1px solid var(--line); background: var(--panel); }
  .agentbar-head {
    padding: 9px 16px 0; font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  }
  .agents { display: flex; gap: 6px; padding: 10px 16px 12px; overflow-x: auto; }
  .agent {
    flex: 1 1 0; min-width: 104px;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 9px 11px; background: var(--panel-2);
    border-left: 2px solid var(--offline);
  }
  .agent.on { border-left-color: var(--idle); }
  .agent.alert { border-left-color: var(--s-exception); }
  .ah { display: flex; align-items: center; gap: 7px; }
  .adot { width: 7px; height: 7px; border-radius: 50%; background: var(--offline); flex: none; }
  .agent.on .adot { background: var(--idle); box-shadow: 0 0 0 0 rgba(53,214,164,.5); animation: pulse 1.8s infinite; }
  .agent.alert .adot { background: var(--s-exception); animation: none; }
  .aname { font-size: 13px; font-weight: 600; }
  .acount {
    margin-left: auto; font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--amber); background: rgba(255,176,0,.1);
    border-radius: 999px; padding: 1px 8px;
  }
  .agent.alert .acount { color: var(--s-exception); background: rgba(255,93,108,.12); }
  .anote { font-size: 11px; color: #aeb8c6; margin-top: 5px; line-height: 1.35; min-height: 15px; }
  .agent.off .anote { color: var(--muted); }
  .aid { font-family: var(--mono); font-size: 9px; letter-spacing: .5px; color: var(--faint); margin-top: 6px; text-transform: uppercase; }
  aside {
    background: var(--panel);
    display: flex; flex-direction: column; min-height: 0;
  }
  aside.left { border-right: 1px solid var(--line); }
  aside.right { border-left: 1px solid var(--line); }
  .panel-head {
    padding: 13px 16px; border-bottom: 1px solid var(--line-soft);
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-head .count { color: var(--amber); }
  .scroll { overflow-y: auto; min-height: 0; flex: 1; }
  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  /* ── fleet rows ── */
  .veh {
    display: grid; grid-template-columns: 1fr auto; gap: 4px;
    padding: 11px 16px; border-bottom: 1px solid var(--line-soft);
  }
  .veh .top { display: flex; align-items: center; gap: 8px; }
  .veh .id { font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .veh .type { font-size: 11px; color: var(--muted); text-transform: capitalize; }
  .veh .meta { font-family: var(--mono); font-size: 11px; color: var(--muted); grid-column: 1 / -1; }
  .veh .meta b { color: #aeb8c6; font-weight: 500; }
  .pill {
    font-family: var(--mono); font-size: 10px; letter-spacing: .5px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
    border: 1px solid transparent; cursor: pointer; white-space: nowrap;
  }
  .pill.idle { color: var(--idle); border-color: rgba(53,214,164,.35); background: rgba(53,214,164,.08); }
  .pill.busy { color: var(--busy); border-color: rgba(255,176,0,.35); background: rgba(255,176,0,.08); }
  .pill.offline { color: var(--muted); border-color: rgba(127,138,155,.3); background: rgba(127,138,155,.06); }

  /* ── map ── */
  #map { position: relative; }
  .no-token {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; background: var(--bg); text-align: center; padding: 20px; z-index: 5;
  }
  .no-token.show { display: flex; }
  .no-token .h { font-size: 16px; color: var(--amber); }
  .no-token .p { font-family: var(--mono); font-size: 12px; color: var(--muted); max-width: 360px; line-height: 1.6; }
  .legend {
    position: absolute; left: 14px; bottom: 14px; z-index: 4;
    background: rgba(11,14,19,.82); border: 1px solid var(--line);
    border-radius: 6px; padding: 10px 12px; backdrop-filter: blur(6px);
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .legend .row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  /* ── order tickets ── */
  .ticket {
    padding: 12px 16px; border-bottom: 1px solid var(--line-soft);
    border-left: 3px solid var(--line);
  }
  .ticket .r1 { display: flex; align-items: center; justify-content: space-between; }
  .ticket .oid { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .ticket .items { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
  .ticket .r3 { display: flex; justify-content: space-between; margin-top: 7px; font-family: var(--mono); font-size: 10px; color: var(--faint); }
  .badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: .6px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
    color: #0b0e13; font-weight: 600;
  }
  .empty { padding: 40px 16px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* ── order detail drawer ── */
  .ticket { cursor: pointer; }
  .ticket:hover { background: var(--panel-2); }
  .ticket.sel { background: var(--panel-2); }
  .drawer {
    position: absolute; top: 0; right: 0; bottom: 0; width: 330px; z-index: 6;
    background: var(--panel); border-left: 1px solid var(--line);
    transform: translateX(105%); transition: transform .22s ease;
    display: flex; flex-direction: column;
    box-shadow: -12px 0 28px rgba(0,0,0,.45);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 13px 16px; border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .drawer-head .oid { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .drawer-head .x {
    margin-left: auto; background: none; border: none; color: var(--muted);
    font-size: 16px; padding: 2px 6px; cursor: pointer;
  }
  .drawer-head .x:hover { color: #fff; }
  .drawer-body { overflow-y: auto; padding: 14px 16px; flex: 1; }
  .d-sec { margin-bottom: 16px; }
  .d-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.6px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 6px;
  }
  .d-items { font-size: 13px; line-height: 1.5; }
  .d-addr { font-family: var(--mono); font-size: 12px; color: #aeb8c6; }
  .d-unit { font-family: var(--mono); font-size: 12px; }
  .drawer-body .muted { color: var(--muted); }
  .tl { list-style: none; margin: 0; padding: 0; }
  .tl li {
    display: flex; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid var(--line-soft); font-size: 12px;
  }
  .tl .g { width: 16px; text-align: center; flex: none; font-family: var(--mono); }
  .tl .t { flex: 1; line-height: 1.4; }
  .tl .at { font-family: var(--mono); font-size: 10px; color: var(--faint); white-space: nowrap; }

  @media (max-width: 940px) {
    .stage { grid-template-columns: 1fr; grid-template-rows: 180px 1fr 200px; }
    aside.left { border-right: none; border-bottom: 1px solid var(--line); }
    aside.right { border-left: none; border-top: 1px solid var(--line); }
    .agents { flex-wrap: nowrap; }
    .stats { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="mark">Otto</span>
    <span class="sub">Dispatch Console</span>
  </div>
  <span class="live"><span id="liveDot" class="dot pulse"></span><span id="liveTxt">Live</span></span>

  <div class="stats">
    <div class="stat amber"><div class="n" id="stActive">0</div><div class="l">In Flight</div></div>
    <div class="stat green"><div class="n" id="stDelivered">0</div><div class="l">Delivered</div></div>
    <div class="stat"><div class="n" id="stIdle">0</div><div class="l">Idle Units</div></div>
    <div class="stat"><div class="n" id="stBusy">0</div><div class="l">On Route</div></div>
  </div>

  <div class="scaler">
    <label for="fleetSize">Fleet</label>
    <input type="range" id="fleetSize" min="1" max="10" step="1" value="5" />
    <span class="scaler-val" id="fleetSizeVal">5</span>
  </div>

  <div class="controls">
    <button id="btnToggle" class="primary">Pause</button>
    <button id="btnSpawn">+ Order</button>
    <button id="btnReset">Reset</button>
  </div>
</header>

<main>
  <div class="stage">
  <aside class="left">
    <div class="panel-head">Fleet <span class="count" id="fleetCount">0</span></div>
    <div class="scroll" id="fleet"></div>
  </aside>

  <div id="map">
    <div class="no-token" id="noToken">
      <div class="h">Map tiles unavailable</div>
      <div class="p">Set <b>MAPBOX_TOKEN</b> in <b>.env</b> and restart to render the map. The dispatch board and simulator keep running without it.</div>
    </div>
    <div class="legend">
      <div class="row"><i style="background:#35d6a4"></i> idle unit</div>
      <div class="row"><i style="background:#ffb000"></i> on route</div>
      <div class="row"><i style="background:#45b8f0"></i> drop pending</div>
      <div class="row"><i style="background:#ff5d6c"></i> exception</div>
    </div>
    <div class="drawer" id="drawer">
      <div class="drawer-head">
        <span class="oid" id="dOid"></span>
        <span class="badge" id="dBadge"></span>
        <button class="x" id="dClose" title="close">✕</button>
      </div>
      <div class="drawer-body" id="dBody"></div>
    </div>
  </div>

  <aside class="right">
    <div class="panel-head">Order Feed <span class="count" id="orderCount">0</span></div>
    <div class="scroll" id="orders"></div>
  </aside>
  </div>

  <section class="agentbar">
    <div class="agentbar-head">Agent Pipeline</div>
    <div class="agents" id="agents"></div>
  </section>
</main>

<script>
const STATUS_COLOR = {
  created: "#8592a4", confirmed: "#8592a4", routed: "#45b8f0", assigned: "#8b8cf6",
  out_for_delivery: "#ffb000", delivered: "#35d6a4", exception: "#ff5d6c",
  failed: "#ff5d6c", cancelled: "#4a5568",
};
const VEH_COLOR = { idle: "#35d6a4", busy: "#ffb000", offline: "#59647a" };
const VEH_STATES = new Set(["idle", "busy", "offline"]);
const ACTIVE = new Set(["created", "confirmed", "routed", "assigned", "out_for_delivery", "exception"]);

// Escape any store-sourced string before putting it in innerHTML.
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// The 8 Otto subagents and how to read their live activity off order/vehicle state.
// (The sim doesn't run the real Claude agents — it mirrors the pipeline each agent owns.)
const AGENTS = [
  { id: "delivery-orchestrator", short: "Orchestrator", role: "supervisor",
    act: (o) => ({ n: o.active.length, note: o.active.length ? `supervising ${o.active.length} · ${o.delivered} done` : "awaiting orders" }) },
  { id: "order-intake", short: "Order Intake", role: "intake",
    act: (o) => ({ n: o.by.created + o.by.confirmed, note: (o.by.created + o.by.confirmed) ? `validating ${o.by.created + o.by.confirmed} address(es)` : "idle" }) },
  { id: "routing-planner", short: "Routing", role: "routing",
    act: (o) => ({ n: o.by.routed, note: o.by.routed ? `planning ${o.by.routed} route(s)` : "idle" }) },
  { id: "fleet-dispatch", short: "Dispatch", role: "dispatch",
    act: (o) => ({ n: o.by.assigned, note: o.by.assigned ? `assigning ${o.by.assigned} order(s)` : "idle" }) },
  { id: "delivery-tracker", short: "Tracker", role: "tracking",
    act: (o) => ({ n: o.by.out_for_delivery, note: o.by.out_for_delivery ? `tracking ${o.by.out_for_delivery} en route` : "idle" }) },
  { id: "exception-recovery", short: "Exceptions", role: "exception",
    act: (o) => ({ n: o.by.exception, alert: o.by.exception > 0, note: o.by.exception ? `recovering ${o.by.exception}` : "no exceptions" }) },
  { id: "customer-comms", short: "Comms", role: "comms",
    act: (o) => ({ n: o.notifs, note: o.notifs ? `${o.notifs} update(s) sent` : "idle" }) },
  { id: "payment-settlement", short: "Payments", role: "payments",
    act: (o) => ({ n: o.charges, note: o.charges ? `${o.charges} charge(s) settled` : "idle" }) },
];

let map = null, mapReady = false;
let cfgGlobal = null;
let lastSnap = null;
let selectedOrderId = null;
let routeDrawnFor = null; // Task 3 uses this; declared here so stubs run

function drawRouteIfNeeded(o) {} // Task 3 replaces
function clearRoute() {}          // Task 3 replaces

async function boot() {
  const cfg = await fetch("/api/config").then(r => r.json());
  cfgGlobal = cfg;
  const slider = document.getElementById("fleetSize");
  if (Number.isFinite(cfg.fleetMin)) slider.min = cfg.fleetMin;
  if (Number.isFinite(cfg.fleetMax)) slider.max = cfg.fleetMax;
  if (cfg.mapboxToken) {
    initMap(cfg);
  } else {
    document.getElementById("noToken").classList.add("show");
  }
  const es = new EventSource("/api/events");
  es.onmessage = e => render(JSON.parse(e.data));
}

function initMap(cfg) {
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/dark-v11",
    center: [cfg.service.center.lng, cfg.service.center.lat],
    zoom: 11.2,
    attributionControl: false,
  });
  map.on("load", () => {
    // service area ring
    map.addSource("area", { type: "geojson", data: ring(cfg.service.center, cfg.service.radiusM) });
    map.addLayer({ id: "area-line", type: "line", source: "area",
      paint: { "line-color": "#8592a4", "line-opacity": 0.22, "line-dasharray": [3, 3] } });

    empty("lines"); empty("drops"); empty("vehicles");
    map.addLayer({ id: "lines", type: "line", source: "lines",
      paint: { "line-color": "#ffb000", "line-width": 1.3, "line-opacity": 0.5, "line-dasharray": [1.5, 1.5] } });
    map.addLayer({ id: "drops", type: "circle", source: "drops",
      paint: { "circle-radius": 5, "circle-color": ["get", "color"],
        "circle-stroke-width": 1.5, "circle-stroke-color": "#0b0e13" } });
    map.addLayer({ id: "veh-glow", type: "circle", source: "vehicles",
      paint: { "circle-radius": 11, "circle-color": ["get", "color"], "circle-opacity": 0.16 } });
    map.addLayer({ id: "veh", type: "circle", source: "vehicles",
      paint: { "circle-radius": 6, "circle-color": ["get", "color"],
        "circle-stroke-width": 2, "circle-stroke-color": "#0b0e13" } });
    mapReady = true;
  });
}

function empty(id) { map.addSource(id, { type: "geojson", data: { type: "FeatureCollection", features: [] } }); }

function ring(c, radiusM, n = 64) {
  const coords = [];
  const dLat = radiusM / 111320;
  const dLng = radiusM / (111320 * Math.cos(c.lat * Math.PI / 180));
  for (let i = 0; i <= n; i++) {
    const a = (i / n) * 2 * Math.PI;
    coords.push([c.lng + dLng * Math.cos(a), c.lat + dLat * Math.sin(a)]);
  }
  return { type: "Feature", geometry: { type: "Polygon", coordinates: [coords] } };
}

function fc(features) { return { type: "FeatureCollection", features }; }
function pt(lng, lat, props) { return { type: "Feature", properties: props, geometry: { type: "Point", coordinates: [lng, lat] } }; }

function render(snap) {
  lastSnap = snap;
  const { orders, vehicles, running } = snap;
  const byId = Object.fromEntries(vehicles.map(v => [v.id, v]));

  // live indicator
  const dot = document.getElementById("liveDot");
  dot.className = running ? "dot pulse" : "dot paused";
  document.getElementById("liveTxt").textContent = running ? "Live" : "Paused";
  document.getElementById("btnToggle").textContent = running ? "Pause" : "Resume";

  // stats
  const active = orders.filter(o => ACTIVE.has(o.status));
  document.getElementById("stActive").textContent = active.length;
  document.getElementById("stDelivered").textContent = orders.filter(o => o.status === "delivered").length;
  document.getElementById("stIdle").textContent = vehicles.filter(v => v.status === "idle").length;
  document.getElementById("stBusy").textContent = vehicles.filter(v => v.status === "busy").length;

  syncFleetSlider(vehicles.length);
  renderFleet(vehicles);
  renderOrders(orders);
  renderAgents(orders);
  renderMap(orders, byId);
  renderDrawer(orders, byId);
}

function renderFleet(vehicles) {
  document.getElementById("fleetCount").textContent = vehicles.length;
  const el = document.getElementById("fleet");
  el.innerHTML = "";
  for (const v of vehicles) {
    const row = document.createElement("div");
    row.className = "veh";
    const st = VEH_STATES.has(v.status) ? v.status : "offline"; // whitelist before using as class
    const cap = Number(v.free_capacity) || 0;
    row.innerHTML = `
      <div class="top">
        <span class="id">${esc(v.id)}</span>
        <span class="type">${esc(v.type)}</span>
      </div>
      <span class="pill ${st}" data-id="${esc(v.id)}" data-status="${st}" title="click to toggle offline">${st}</span>
      <div class="meta">cap <b>${cap}</b> · ${v.assigned_order ? "→ <b>" + esc(v.assigned_order) + "</b>" : "unassigned"}</div>`;
    el.appendChild(row);
  }
  el.querySelectorAll(".pill").forEach(p => p.addEventListener("click", toggleVehicle));
}

async function toggleVehicle(e) {
  const id = e.target.dataset.id;
  const cur = e.target.dataset.status;
  const status = cur === "offline" ? "idle" : "offline"; // simple ops toggle
  await fetch("/api/fleet", { method: "POST", headers: { "content-type": "application/json" },
    body: JSON.stringify({ id, status }) });
}

function renderOrders(orders) {
  const feed = [...orders].sort((a, b) => (b.updated_at || "").localeCompare(a.updated_at || "")).slice(0, 40);
  document.getElementById("orderCount").textContent = orders.filter(o => ACTIVE.has(o.status)).length;
  const el = document.getElementById("orders");
  if (!feed.length) { el.innerHTML = '<div class="empty">Waiting for orders…</div>'; return; }
  el.innerHTML = "";
  for (const o of feed) {
    const color = STATUS_COLOR[o.status] || "#8592a4"; // fixed palette, not user data
    const items = (o.items || []).map(i => `${Number(i.qty) || 0}× ${esc(i.name)}`).join(", ") || "—";
    const label = esc(String(o.status).replace(/_/g, " "));
    const card = document.createElement("div");
    card.className = "ticket";
    card.style.borderLeftColor = color;
    if (o.order_id === selectedOrderId) card.classList.add("sel");
    card.addEventListener("click", () => selectOrder(o.order_id));
    card.innerHTML = `
      <div class="r1">
        <span class="oid">${esc(o.order_id)}</span>
        <span class="badge" style="background:${color}">${label}</span>
      </div>
      <div class="items">${items}</div>
      <div class="r3">
        <span>${o.assigned_vehicle ? "unit " + esc(o.assigned_vehicle) : "—"}</span>
        <span>${esc(o.drop_address || "")}</span>
      </div>`;
    el.appendChild(card);
  }
}

function selectOrder(id) {
  selectedOrderId = id;
  routeDrawnFor = null;
  document.getElementById("drawer").classList.add("open");
  if (lastSnap) {
    const byId = Object.fromEntries(lastSnap.vehicles.map(v => [v.id, v]));
    renderDrawer(lastSnap.orders, byId);
  }
}

function closeDrawer() {
  if (!selectedOrderId) return;
  selectedOrderId = null;
  document.getElementById("drawer").classList.remove("open");
  clearRoute();
}

function fmtTime(iso) {
  const d = new Date(iso);
  return isNaN(d) ? "" : d.toLocaleTimeString([], { hour12: false });
}

// Merge status history + notifications + charges into one time-ordered feed.
function buildEvents(o) {
  const ev = [];
  const hist = (o.status_history && o.status_history.length)
    ? o.status_history
    : [{ status: o.status, at: o.updated_at }]; // legacy order: synthesize
  for (const h of hist) ev.push({
    at: h.at, glyph: "●", color: STATUS_COLOR[h.status] || "#8592a4",
    html: esc(String(h.status).replace(/_/g, " ")),
  });
  for (const n of (o.notifications || [])) ev.push({
    at: n.at, glyph: "✉", color: "#45b8f0",
    html: `${esc(n.channel)} “${esc(n.body)}” <span class="muted">${esc(n.status)}</span>`,
  });
  for (const t of (o.transactions || [])) ev.push({
    at: t.at, glyph: "$", color: t.kind === "refund" ? "#ff5d6c" : "#35d6a4",
    html: `${esc(t.kind)} $${(Number(t.amount) || 0).toFixed(2)} <span class="muted">${esc(t.status)}</span>`,
  });
  return ev.sort((a, b) => String(a.at).localeCompare(String(b.at)));
}

function renderDrawer(orders, byId) {
  if (!selectedOrderId) return;
  const o = orders.find(x => x.order_id === selectedOrderId);
  if (!o) { closeDrawer(); return; }

  const color = STATUS_COLOR[o.status] || "#8592a4";
  document.getElementById("dOid").textContent = o.order_id;
  const badge = document.getElementById("dBadge");
  badge.textContent = String(o.status).replace(/_/g, " ");
  badge.style.background = color;

  const v = o.assigned_vehicle ? byId[o.assigned_vehicle] : null;
  const unit = v
    ? `<b>${esc(v.id)}</b> · ${esc(v.type)} · <span class="muted">${esc(v.status)}</span>`
    : (o.assigned_vehicle ? esc(o.assigned_vehicle) : '<span class="muted">unassigned</span>');

  const items = (o.items || [])
    .map(i => `${Number(i.qty) || 0}× ${esc(i.name)}`).join("<br>") || "—";

  const tl = buildEvents(o).map(e => `
    <li><span class="g" style="color:${e.color}">${e.glyph}</span>
        <span class="t">${e.html}</span>
        <span class="at">${esc(fmtTime(e.at))}</span></li>`).join("");

  document.getElementById("dBody").innerHTML = `
    <div class="d-sec"><div class="d-label">Items</div><div class="d-items">${items}</div></div>
    <div class="d-sec"><div class="d-label">Drop</div><div class="d-addr">${esc(o.drop_address || "—")}</div></div>
    <div class="d-sec"><div class="d-label">Assigned Unit</div><div class="d-unit">${unit}</div></div>
    <div class="d-sec"><div class="d-label">Event Log</div><ul class="tl">${tl}</ul></div>`;

  drawRouteIfNeeded(o);
}

function renderAgents(orders) {
  const by = { created: 0, confirmed: 0, routed: 0, assigned: 0, out_for_delivery: 0, delivered: 0, exception: 0, failed: 0, cancelled: 0 };
  let notifs = 0, charges = 0;
  for (const o of orders) {
    if (o.status in by) by[o.status]++;
    notifs += (o.notifications || []).length;
    charges += (o.transactions || []).filter(t => t.kind === "charge").length;
  }
  const ctx = { by, active: orders.filter(o => ACTIVE.has(o.status)), delivered: by.delivered, notifs, charges };

  const el = document.getElementById("agents");
  el.innerHTML = "";
  for (const a of AGENTS) {
    const s = a.act(ctx);
    const state = s.alert ? "alert" : s.n > 0 ? "on" : "off";
    const tile = document.createElement("div");
    tile.className = "agent " + state;
    tile.innerHTML = `
      <div class="ah"><span class="adot"></span><span class="aname">${esc(a.short)}</span>${s.n > 0 ? `<span class="acount">${s.n}</span>` : ""}</div>
      <div class="anote">${esc(s.note)}</div>
      <div class="aid">${esc(a.id)}</div>`;
    el.appendChild(tile);
  }
}

function renderMap(orders, byId) {
  if (!mapReady) return;
  const vehicles = Object.values(byId);
  map.getSource("vehicles").setData(fc(
    vehicles.map(v => pt(v.location.lng, v.location.lat, { color: VEH_COLOR[v.status] }))
  ));
  const active = orders.filter(o => ACTIVE.has(o.status) && o.drop);
  map.getSource("drops").setData(fc(
    active.map(o => pt(o.drop.lng, o.drop.lat, { color: STATUS_COLOR[o.status] || "#8592a4" }))
  ));
  const lines = [];
  for (const o of active) {
    const v = o.assigned_vehicle ? byId[o.assigned_vehicle] : null;
    if (v && o.drop) lines.push({ type: "Feature", properties: {},
      geometry: { type: "LineString", coordinates: [[v.location.lng, v.location.lat], [o.drop.lng, o.drop.lat]] } });
  }
  map.getSource("lines").setData(fc(lines));
}

// ── fleet scaler ──
let fleetDragging = false; // don't clobber the thumb while the user drags it
const fleetSlider = document.getElementById("fleetSize");
const fleetVal = document.getElementById("fleetSizeVal");

// Keep the slider in step with the live fleet size, except while dragging.
function syncFleetSlider(size) {
  if (fleetDragging) return;
  fleetSlider.value = size;
  fleetVal.textContent = size;
}

fleetSlider.addEventListener("input", () => {
  fleetDragging = true;
  fleetVal.textContent = fleetSlider.value;
});
fleetSlider.addEventListener("change", async () => {
  const size = Number(fleetSlider.value);
  await fetch("/api/fleet/size", { method: "POST", headers: { "content-type": "application/json" },
    body: JSON.stringify({ size }) });
  fleetDragging = false;
});

const post = a => fetch("/api/sim/" + a, { method: "POST" });
document.getElementById("btnToggle").addEventListener("click", () =>
  post(document.getElementById("btnToggle").textContent === "Pause" ? "pause" : "resume"));
document.getElementById("btnSpawn").addEventListener("click", () => post("spawn"));
document.getElementById("btnReset").addEventListener("click", () => post("reset"));

document.getElementById("dClose").addEventListener("click", closeDrawer);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });
// click-away: any click on the map area outside the drawer closes it
document.getElementById("map").addEventListener("click", e => {
  if (e.target.closest && e.target.closest("#drawer")) return;
  closeDrawer();
});

boot();
</script>
</body>
